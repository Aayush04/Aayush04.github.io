<svg width="62" height="42" viewBox="0 0 62 42" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Orange circle background -->
  <circle cx="21" cy="21" r="21" fill="#e85d04"/>

  <!--
    M polygon — same exact path as logo.svg but filled BLACK instead of white.
    Points: left-outer-leg x=10, right-outer-leg x=32
    The right leg of M (x=28 to x=32) becomes the shared vertical with E.
  -->
  <path d="M10 30 L10 13 L16 13 L21 22 L26 13 L32 13 L32 30 L28 30 L28 18.5 L23 27.5 L19 27.5 L14 18.5 L14 30 Z" fill="#1a1a2e"/>

  <!--
    Shared vertical: right leg of M is x=28..32, y=13..30.
    Paint it white so it reads as E's spine.
  -->
  <rect x="28" y="13" width="4" height="17" fill="white"/>

  <!--
    E bars — white, start at x=28 (spine), extend right.
    Top bar:    y=13,    height=3
    Middle bar: y=21.5,  height=3  (shorter — classic E style)
    Bottom bar: y=27,    height=3
  -->
  <!-- Top -->
  <rect x="28" y="13" width="18" height="3" fill="white"/>
  <!-- Middle (3/4 width of top) -->
  <rect x="28" y="21.5" width="14" height="3" fill="white"/>
  <!-- Bottom -->
  <rect x="28" y="27" width="18" height="3" fill="white"/>

</svg>
