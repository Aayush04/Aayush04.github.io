<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crossword — बूझो तो जानें</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273549;
      --accent:    #6366f1;
      --accent2:   #818cf8;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --black:     #060f1e;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
      --cell:      36px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header / topbar ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 2px solid var(--surface2);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-left  { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── Score pills (shared style) ── */
    .score-pills { display: flex; gap: 10px; align-items: center; }
    .score-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
    }
    .correct-pill { background: rgba(34,197,94,.15);  color: var(--green); }
    .wrong-pill   { background: rgba(239,68,68,.15);  color: var(--red); }
    .skip-pill    { background: rgba(245,158,11,.15); color: var(--yellow); }

    /* page body padding now that header is sticky */
    .page-body {
      padding: 24px 12px 60px;
    }

    /* ── Buttons ── */
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.96); }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-green     { background: rgba(34,197,94,.2); color: var(--green); border: 1.5px solid var(--green); }
    .btn-red       { background: rgba(239,68,68,.15); color: var(--red); border: 1.5px solid var(--red); }

    /* back link */
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Layout ── */
    .layout {
      display: flex;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* ── Grid wrapper ── */
    .grid-wrapper {
      flex: 0 0 auto;
      overflow-x: auto;
    }

    /* ── Crossword table ── */
    #cwTable {
      border-collapse: collapse;
      background: var(--black);
      border: 3px solid var(--black);
      border-radius: 6px;
      overflow: hidden;
    }
    #cwTable td {
      width:  var(--cell);
      height: var(--cell);
      padding: 0;
      border: 1.5px solid #1a2640;
      position: relative;
    }

    /* black/blocked cell */
    td.cell-black {
      background: var(--black);
      border-color: var(--black);
    }

    /* white fillable cell */
    td.cell-white {
      background: #e8edf5;
    }

    /* cell number label */
    .cell-num {
      position: absolute;
      top: 1px;
      left: 2px;
      font-size: 8px;
      font-weight: 700;
      color: #444;
      line-height: 1;
      pointer-events: none;
      z-index: 1;
    }

    /* the actual letter input */
    td.cell-white input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-size: 1rem;
      font-weight: 800;
      color: #111;
      text-transform: uppercase;
      caret-color: transparent;
      cursor: pointer;
      outline: none;
      padding-top: 8px;   /* push letter below the clue number */
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 2;
    }
    td.cell-white input:focus { outline: none; }

    /* highlight states */
    td.cell-active   { background: #b3c4f0 !important; }
    td.cell-selected { background: #d4e2ff !important; }

    /* correct / wrong */
    td.cell-correct { background: #bbf7d0 !important; }
    td.cell-wrong   { background: #fecaca !important; }
    td.cell-correct input, td.cell-wrong input { color: #111 !important; }
    td.cell-revealed input { color: #6366f1 !important; font-style: italic; }

    /* ── Clues panel ── */
    .clues-panel {
      flex: 1 1 320px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 260px;
      max-width: 440px;
    }

    .clues-section {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .clues-section h2 {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 12px 16px;
      border-bottom: 2px solid var(--surface2);
      background: var(--surface2);
    }
    .clues-list {
      list-style: none;
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .clues-list::-webkit-scrollbar { width: 4px; }
    .clues-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

    .clues-list li {
      display: flex;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--surface2);
      transition: background .15s;
      font-size: .83rem;
      line-height: 1.5;
    }
    .clues-list li:last-child { border-bottom: none; }
    .clues-list li:hover { background: var(--surface2); }
    .clues-list li.clue-active {
      background: rgba(99,102,241,.18);
      border-left: 3px solid var(--accent);
    }
    .clue-num {
      font-weight: 800;
      color: var(--accent2);
      min-width: 20px;
      flex-shrink: 0;
    }
    .clue-text { color: var(--text); }
    .clue-done .clue-text { color: var(--muted); }
    .clue-done .clue-num  { color: var(--green); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 11px 22px;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Direction toggle ── */
    .dir-toggle {
      display: flex;
      gap: 6px;
      align-items: center;
      background: var(--surface2);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .8rem;
      color: var(--muted);
      cursor: default;
      user-select: none;
    }
    .dir-toggle strong { color: var(--accent2); }

    @media (max-width: 640px) {
      :root { --cell: 28px; }
      #cwTable td { border-width: 1px; }
      td.cell-white input { font-size: .82rem; padding-top: 7px; }
      .cell-num { font-size: 6.5px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="back-link" href="../index.html">← Home</a>
    <h1>🧩 बूझो तो जानें — Crossword</h1>
  </div>
  <div class="header-actions">
    <div class="score-pills">
      <span class="score-pill correct-pill">✓ <span id="scCorrect">0</span></span>
      <span class="score-pill wrong-pill">✗ <span id="scWrong">0</span></span>
      <span class="score-pill skip-pill">– <span id="scEmpty">0</span></span>
    </div>
    <span class="dir-toggle" id="dirDisplay">Direction: <strong id="dirLabel">Across →</strong></span>
    <button class="btn btn-secondary" id="checkBtn">✔ Check</button>
    <button class="btn btn-red"       id="clearBtn">✕ Clear All</button>
    <button class="btn btn-green"     id="revealWordBtn">💡 Reveal Word</button>
  </div>
</header>

<div class="page-body">
<div class="layout">

  <!-- ── Grid ── -->
  <div class="grid-wrapper">
    <table id="cwTable"></table>
  </div>

  <!-- ── Right panel ── -->
  <div class="clues-panel">
    <div class="clues-section">
      <h2>→ Across (दायें से बायें)</h2>
      <ul class="clues-list" id="acrossList"></ul>
    </div>

    <!-- Down clues -->
    <div class="clues-section">
      <h2>↓ Down (ऊपर से नीचे)</h2>
      <ul class="clues-list" id="downList"></ul>
    </div>

  </div>
</div>
</div><!-- /.page-body -->

<!-- Toast -->
<div id="toast"></div>

<script src="questions6.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//  Crossword Engine
// ════════════════════════════════════════════════════════════

const SAVE_KEY = 'cw_progress';

const ROWS = CROSSWORD.grid.length;
const COLS = CROSSWORD.grid[0].length;

// words[dir][num] = { cells: [[r,c],...], answer: "" }
const words = { across: {}, down: {} };

// Helper: is a grid cell white (non-null)?
function isWhiteCell(cell) { return cell !== null; }
// Helper: get num from a grid cell object (or null)
function cellNum(cell) { return (cell && typeof cell === 'object' && cell.num) ? cell.num : null; }

function buildWordMap() {
  // ── Across: scan each row ──
  for (let r = 0; r < ROWS; r++) {
    let run = [];
    let startNum = null;

    for (let c = 0; c <= COLS; c++) {
      const cell = c < COLS ? CROSSWORD.grid[r][c] : null;

      if (isWhiteCell(cell)) {
        // starting a new run?
        if (run.length === 0) {
          startNum = cellNum(cell); // null if no number
        }
        run.push([r, c]);
      } else {
        // end of run — only record if ≥2 cells AND started with a numbered cell
        if (run.length >= 2 && startNum !== null) {
          words.across[startNum] = { cells: run.slice(), answer: '' };
        }
        run = [];
        startNum = null;
      }
    }
  }

  // ── Down: scan each column ──
  for (let c = 0; c < COLS; c++) {
    let run = [];
    let startNum = null;

    for (let r = 0; r <= ROWS; r++) {
      const cell = r < ROWS ? CROSSWORD.grid[r][c] : null;

      if (isWhiteCell(cell)) {
        if (run.length === 0) {
          startNum = cellNum(cell);
        }
        run.push([r, c]);
      } else {
        if (run.length >= 2 && startNum !== null) {
          words.down[startNum] = { cells: run.slice(), answer: '' };
        }
        run = [];
        startNum = null;
      }
    }
  }

  // ── Attach answers from clue data ──
  CROSSWORD.clues.across.forEach(cl => {
    if (words.across[cl.sno]) words.across[cl.sno].answer = (cl.answer || '').toUpperCase();
  });
  CROSSWORD.clues.down.forEach(cl => {
    if (words.down[cl.sno]) words.down[cl.sno].answer = (cl.answer || '').toUpperCase();
  });
}

// ── Render grid ──
const table = document.getElementById('cwTable');

// inputs[r][c] = <input> element or null
const inputs = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

function buildGrid() {
  table.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < COLS; c++) {
      const cell = CROSSWORD.grid[r][c];
      const td = document.createElement('td');

      if (cell === null) {
        td.className = 'cell-black';
      } else {
        td.className = 'cell-white';
        // number label
        if (typeof cell === 'object' && cell.num) {
          const lbl = document.createElement('span');
          lbl.className = 'cell-num';
          lbl.textContent = cell.num;
          td.appendChild(lbl);
        }
        // input
        const inp = document.createElement('input');
        inp.maxLength = 1;
        inp.dataset.r = r;
        inp.dataset.c = c;
        inp.addEventListener('click',   () => onCellClick(r, c));
        inp.addEventListener('keydown', (e) => onKeyDown(e, r, c));
        inp.addEventListener('input',   (e) => onInput(e, r, c));
        td.appendChild(inp);
        inputs[r][c] = inp;
      }

      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
}

// ── State ──
let activeDir = 'across';   // 'across' | 'down'
let activeNum = null;        // current clue number
let activeCell = null;       // [r,c]

function getTd(r, c) {
  return table.rows[r]?.cells[c];
}

// ── Highlight word ──
function highlightWord(dir, num, focusR, focusC) {
  // clear old highlights
  document.querySelectorAll('.cell-active, .cell-selected').forEach(el => {
    el.classList.remove('cell-active', 'cell-selected');
  });

  activeDir = dir;
  activeNum = num;
  if (focusR !== undefined) activeCell = [focusR, focusC];

  const word = words[dir][num];
  if (!word) return;

  word.cells.forEach(([r, c]) => {
    const td = getTd(r, c);
    if (td) td.classList.add('cell-selected');
  });

  if (focusR !== undefined) {
    const td = getTd(focusR, focusC);
    if (td) {
      td.classList.remove('cell-selected');
      td.classList.add('cell-active');
    }
    const inp = inputs[focusR][focusC];
    if (inp) inp.focus();
  }

  // highlight clue in list
  highlightClue(dir, num);
  updateDirDisplay();
}

function highlightClue(dir, num) {
  document.querySelectorAll('.clue-active').forEach(el => el.classList.remove('clue-active'));
  const el = document.querySelector(`[data-dir="${dir}"][data-num="${num}"]`);
  if (el) {
    el.classList.add('clue-active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ── Cell click ──
function onCellClick(r, c) {
  // Find which words pass through this cell
  const inAcross = Object.entries(words.across).find(([, w]) => w.cells.some(([wr, wc]) => wr === r && wc === c));
  const inDown   = Object.entries(words.down).find(([, w])   => w.cells.some(([wr, wc]) => wr === r && wc === c));

  if (!inAcross && !inDown) return;

  // Toggle direction if clicking the same cell again
  if (activeCell && activeCell[0] === r && activeCell[1] === c) {
    if (activeDir === 'across' && inDown)   { highlightWord('down',   parseInt(inDown[0]),   r, c); }
    else if (activeDir === 'down' && inAcross) { highlightWord('across', parseInt(inAcross[0]), r, c); }
    return;
  }

  // Prefer current direction if valid
  if (activeDir === 'across' && inAcross) { highlightWord('across', parseInt(inAcross[0]), r, c); }
  else if (activeDir === 'down' && inDown) { highlightWord('down',   parseInt(inDown[0]),   r, c); }
  else if (inAcross) { highlightWord('across', parseInt(inAcross[0]), r, c); }
  else               { highlightWord('down',   parseInt(inDown[0]),   r, c); }
}

// ── Keyboard ──
function onKeyDown(e, r, c) {
  if (e.key === 'Tab') {
    e.preventDefault();
    navigateToNextWord(e.shiftKey ? -1 : 1);
    return;
  }
  if (e.key === 'ArrowRight') { e.preventDefault(); moveToCell(r, c + 1); return; }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); moveToCell(r, c - 1); return; }
  if (e.key === 'ArrowDown')  { e.preventDefault(); moveToCell(r + 1, c); return; }
  if (e.key === 'ArrowUp')    { e.preventDefault(); moveToCell(r - 1, c); return; }
  if (e.key === 'Backspace') {
    const inp = inputs[r][c];
    if (inp && inp.value === '') {
      // move backwards
      advanceInWord(-1, r, c);
    }
    clearCellState(r, c);
    saveProgress();
    return;
  }
  if (e.key === 'Delete') { clearCellState(r, c); saveProgress(); return; }
}

function onInput(e, r, c) {
  const inp = inputs[r][c];
  if (!inp) return;
  // allow only single letter
  const val = inp.value.replace(/[^a-zA-Zа-яА-Яऀ-ॿ]/g, '');
  inp.value = val ? val[val.length - 1].toUpperCase() : '';

  clearCellState(r, c);
  saveProgress();

  if (inp.value) advanceInWord(1, r, c);
}

function clearCellState(r, c) {
  const td = getTd(r, c);
  if (td) td.classList.remove('cell-correct', 'cell-wrong', 'cell-revealed');
}

function moveToCell(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  const inp = inputs[r][c];
  if (inp) {
    activeCell = [r, c];
    inp.click();
  }
}

function advanceInWord(delta, r, c) {
  if (!activeNum) return;
  const word = words[activeDir][activeNum];
  if (!word) return;
  const idx = word.cells.findIndex(([wr, wc]) => wr === r && wc === c);
  const next = word.cells[idx + delta];
  if (next) {
    const [nr, nc] = next;
    activeCell = [nr, nc];
    const inp = inputs[nr][nc];
    if (inp) inp.focus();
    // update highlight
    const td = getTd(nr, nc);
    document.querySelectorAll('.cell-active').forEach(el => el.classList.remove('cell-active'));
    document.querySelectorAll('.cell-selected').forEach(el => el.classList.remove('cell-selected'));
    word.cells.forEach(([wr, wc]) => {
      const t = getTd(wr, wc);
      if (t) t.classList.add('cell-selected');
    });
    if (td) { td.classList.remove('cell-selected'); td.classList.add('cell-active'); }
  }
}

function navigateToNextWord(delta) {
  const clues = CROSSWORD.clues[activeDir];
  if (!clues) return;
  const nums = clues.map(cl => cl.sno);
  const idx  = nums.indexOf(activeNum);
  const next = nums[(idx + delta + nums.length) % nums.length];
  const word = words[activeDir][next];
  if (word) {
    const [r, c] = word.cells[0];
    highlightWord(activeDir, next, r, c);
  }
}

// ── Clue lists ──
function buildClueLists() {
  const acrossEl = document.getElementById('acrossList');
  const downEl   = document.getElementById('downList');

  CROSSWORD.clues.across.forEach(cl => {
    const li = document.createElement('li');
    li.dataset.dir = 'across';
    li.dataset.num = cl.sno;
    li.innerHTML = `<span class="clue-num">${cl.sno}</span><span class="clue-text">${cl.clue}</span>`;
    li.addEventListener('click', () => {
      const word = words.across[cl.sno];
      if (word) {
        const [r, c] = word.cells[0];
        highlightWord('across', cl.sno, r, c);
      }
    });
    acrossEl.appendChild(li);
  });

  CROSSWORD.clues.down.forEach(cl => {
    const li = document.createElement('li');
    li.dataset.dir = 'down';
    li.dataset.num = cl.sno;
    li.innerHTML = `<span class="clue-num">${cl.sno}</span><span class="clue-text">${cl.clue}</span>`;
    li.addEventListener('click', () => {
      const word = words.down[cl.sno];
      if (word) {
        const [r, c] = word.cells[0];
        highlightWord('down', cl.sno, r, c);
      }
    });
    downEl.appendChild(li);
  });
}

// ── Direction display ──
function updateDirDisplay() {
  document.getElementById('dirLabel').textContent =
    activeDir === 'across' ? 'Across →' : 'Down ↓';
}

// ── Check answers ──
document.getElementById('checkBtn').addEventListener('click', checkAnswers);

function checkAnswers() {
  let correct = 0, wrong = 0, empty = 0;
  const allWords = [
    ...Object.entries(words.across).map(([n, w]) => ({ dir: 'across', num: parseInt(n), ...w })),
    ...Object.entries(words.down).map(([n, w])   => ({ dir: 'down',   num: parseInt(n), ...w })),
  ];

  allWords.forEach(({ dir, num, cells, answer }) => {
    if (!answer) return;
    const filled = cells.map(([r, c]) => inputs[r][c]?.value || '').join('');
    const isComplete = !filled.includes('');
    const isCorrect  = filled === answer;

    if (!isComplete) {
      empty++;
      // mark individual wrong cells
      cells.forEach(([r, c], i) => {
        const inp = inputs[r][c];
        const td  = getTd(r, c);
        if (!inp || !td) return;
        if (inp.value && answer[i] && inp.value !== answer[i]) {
          td.classList.add('cell-wrong');
        }
      });
    } else if (isCorrect) {
      correct++;
      cells.forEach(([r, c]) => {
        const td = getTd(r, c);
        if (td) { td.classList.remove('cell-wrong'); td.classList.add('cell-correct'); }
      });
      // mark clue done
      const li = document.querySelector(`[data-dir="${dir}"][data-num="${num}"]`);
      if (li) li.classList.add('clue-done');
    } else {
      wrong++;
      cells.forEach(([r, c], i) => {
        const inp = inputs[r][c];
        const td  = getTd(r, c);
        if (!inp || !td) return;
        td.classList.remove('cell-correct');
        if (inp.value !== answer[i]) td.classList.add('cell-wrong');
      });
    }
  });

  document.getElementById('scCorrect').textContent = correct;
  document.getElementById('scWrong').textContent   = wrong;
  document.getElementById('scEmpty').textContent   = empty;

  showToast(`✔ ${correct} correct · ✗ ${wrong} wrong · ○ ${empty} incomplete`);
}

// ── Reveal current word ──
document.getElementById('revealWordBtn').addEventListener('click', () => {
  if (!activeNum) { showToast('Click a cell first'); return; }
  const word = words[activeDir][activeNum];
  if (!word || !word.answer) { showToast('No answer available for this word'); return; }

  word.cells.forEach(([r, c], i) => {
    const inp = inputs[r][c];
    const td  = getTd(r, c);
    if (!inp || !td) return;
    inp.value = word.answer[i] || '';
    td.classList.remove('cell-wrong', 'cell-correct');
    td.classList.add('cell-revealed');
  });
  saveProgress();
  showToast('💡 Answer revealed');
});

// ── Clear all ──
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Clear all letters?')) return;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const inp = inputs[r][c];
      const td  = getTd(r, c);
      if (inp) inp.value = '';
      if (td)  td.classList.remove('cell-correct', 'cell-wrong', 'cell-revealed');
    }
  }
  document.querySelectorAll('.clue-done').forEach(el => el.classList.remove('clue-done'));
  document.getElementById('scCorrect').textContent = '0';
  document.getElementById('scWrong').textContent   = '0';
  document.getElementById('scEmpty').textContent   = '0';
  clearSave();
  showToast('Cleared');
});

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Save / Load progress ──
function saveProgress() {
  const data = {};
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const inp = inputs[r][c];
      if (inp && inp.value) data[`${r},${c}`] = inp.value;
    }
  }
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    Object.entries(data).forEach(([key, val]) => {
      const [r, c] = key.split(',').map(Number);
      const inp = inputs[r][c];
      if (inp) inp.value = val;
    });
    showToast('Progress restored ✓');
  } catch {}
}

function clearSave() {
  localStorage.removeItem(SAVE_KEY);
}

// ── Init ──
buildWordMap();
buildGrid();
buildClueLists();
loadProgress();

// Start on first across clue
const firstAcross = CROSSWORD.clues.across[0];
if (firstAcross && words.across[firstAcross.sno]) {
  const [r, c] = words.across[firstAcross.sno].cells[0];
  highlightWord('across', firstAcross.sno, r, c);
}
updateDirDisplay();
</script>
