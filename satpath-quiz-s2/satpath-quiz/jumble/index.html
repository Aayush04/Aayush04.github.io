<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jumble — Arrange the Letters</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #273549;
      --accent:   #14b8a6;
      --accent2:  #2dd4bf;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --radius:   14px;
      --shadow:   0 4px 24px rgba(0,0,0,.5);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 2px solid var(--surface2);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }
    .topbar h1 {
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      width: 160px;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Score pills ── */
    .score-pills { display: flex; gap: 10px; align-items: center; }
    .score-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
    }
    .correct-pill { background: rgba(34,197,94,.15);  color: var(--green); }
    .wrong-pill   { background: rgba(239,68,68,.15);  color: var(--red); }
    .skip-pill    { background: rgba(245,158,11,.15); color: var(--yellow); }

    /* ── Main card area ── */
    .main {
      max-width: 720px;
      margin: 36px auto 0;
      padding: 0 16px;
    }

    /* ── Question card ── */
    .q-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      margin-bottom: 24px;
    }
    .q-num {
      font-size: .75rem;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }
    .q-instruction {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* ── Drop zone ── */
    .drop-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .drop-zone {
      min-height: 60px;
      background: var(--surface2);
      border: 2px dashed rgba(45,212,191,.35);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
      transition: border-color .2s, background .2s;
    }
    .drop-zone.drag-over {
      border-color: var(--accent2);
      background: rgba(45,212,191,.08);
    }
    .drop-zone.correct-zone  { border-color: var(--green); background: rgba(34,197,94,.07); }
    .drop-zone.wrong-zone    { border-color: var(--red);   background: rgba(239,68,68,.07); }
    .drop-zone-empty {
      color: var(--muted);
      font-size: .83rem;
      font-style: italic;
      pointer-events: none;
      user-select: none;
    }

    /* ── Tile pool ── */
    .pool-zone {
      min-height: 52px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }

    /* ── Tiles ── */
    .tile {
      background: var(--surface2);
      border: 2px solid rgba(45,212,191,.3);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: transform .15s, box-shadow .15s, border-color .15s, background .15s;
      touch-action: manipulation;
    }
    .tile:hover   { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.4); border-color: var(--accent2); }
    .tile:active  { transform: scale(.95); }
    .tile.dragging { opacity: .4; }
    .tile.in-answer { border-color: rgba(45,212,191,.5); background: rgba(45,212,191,.12); }
    .tile.correct-tile { border-color: var(--green); background: rgba(34,197,94,.18); color: var(--green); cursor: default; }
    .tile.wrong-tile   { border-color: var(--red);   background: rgba(239,68,68,.18);  color: var(--red);   cursor: default; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-primary   { background: var(--accent);   color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-green     { background: rgba(34,197,94,.2);  color: var(--green); border: 1.5px solid var(--green); }
    .btn-red       { background: rgba(239,68,68,.15); color: var(--red);   border: 1.5px solid var(--red); }
    .btn-yellow    { background: rgba(245,158,11,.15);color: var(--yellow);border: 1.5px solid var(--yellow); }

    /* ── Feedback banner ── */
    .feedback {
      border-radius: 10px;
      padding: 13px 18px;
      font-size: .9rem;
      font-weight: 600;
      line-height: 1.5;
      margin-top: 16px;
      display: none;
    }
    .feedback.correct { background: rgba(34,197,94,.12); border: 1.5px solid var(--green); color: var(--green); display: block; }
    .feedback.wrong   { background: rgba(239,68,68,.12); border: 1.5px solid var(--red);   color: var(--red);   display: block; }

    /* ── Result screen ── */
    #resultScreen {
      display: none;
      max-width: 720px;
      margin: 36px auto 0;
      padding: 0 16px;
    }
    .result-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .result-summary {
      padding: 28px 28px 20px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 2px solid var(--surface2);
    }
    .result-stat { display: flex; flex-direction: column; align-items: center; }
    .result-num  { font-size: 2rem; font-weight: 800; }
    .result-lbl  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .result-body {
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .result-body::-webkit-scrollbar       { width: 4px; }
    .result-body::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .84rem;
    }
    .result-table th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .result-table td { padding: 11px 14px; border-bottom: 1px solid var(--surface2); vertical-align: top; }
    .result-table tr:last-child td { border-bottom: none; }
    .badge-correct { color: var(--green); font-weight: 700; }
    .badge-wrong   { color: var(--red);   font-weight: 700; }
    .badge-skipped { color: var(--yellow);font-weight: 700; }
    .ans-text { color: var(--accent2); font-size: .82rem; }

    /* ── Sno badge on result ── */
    .sno-badge {
      display: inline-block;
      background: var(--surface2);
      border-radius: 6px;
      padding: 1px 8px;
      font-size: .75rem;
      color: var(--muted);
      margin-right: 6px;
    }

    /* ── Resume banner ── */
    .resume-banner {
      display: none;
      max-width: 720px;
      margin: 18px auto 0;
      padding: 0 16px;
    }
    .resume-banner-inner {
      background: linear-gradient(135deg, var(--surface), #1b2d3b);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }
    .resume-icon { font-size: 1.6rem; flex-shrink: 0; }
    .resume-text { flex: 1; min-width: 180px; }
    .resume-text strong { display: block; font-size: .98rem; color: var(--accent2); margin-bottom: 3px; }
    .resume-text span   { font-size: .8rem; color: var(--muted); }
    .resume-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .resume-yes-btn {
      padding: 7px 18px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff;
      font-size: .85rem; font-weight: 700; cursor: pointer;
    }
    .resume-yes-btn:hover { opacity: .85; }
    .resume-no-btn {
      padding: 7px 14px; border-radius: 8px;
      border: 2px solid var(--surface2); background: transparent;
      color: var(--muted); font-size: .85rem; font-weight: 600; cursor: pointer;
    }
    .resume-no-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Toast ── */
    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 2px solid var(--accent);
      color: var(--text);
      padding: 11px 22px;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Nav row ── */
    .nav-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .nav-row .spacer { flex: 1; }

    /* ── Example badge ── */
    .example-badge {
      display: inline-block;
      background: rgba(245,158,11,.18);
      color: var(--yellow);
      border: 1.5px solid var(--yellow);
      border-radius: 6px;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 10px;
      margin-left: 10px;
      vertical-align: middle;
    }

    @media (max-width: 540px) {
      .q-card { padding: 20px 16px 18px; }
      .topbar  { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="topbar-left">
    <a class="back-link" href="../index.html">← Home</a>
    <h1>🔀 आओ बिखरो को सुलझाएं</h1>
  </div>
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
    <div class="score-pills">
      <span class="score-pill correct-pill">✓ <span id="scCorrect">0</span></span>
      <span class="score-pill wrong-pill">✗ <span id="scWrong">0</span></span>
      <span class="score-pill skip-pill">– <span id="scSkipped">0</span></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>
  </div>
</div>

<!-- ── Resume banner ── -->
<div class="resume-banner" id="resumeBanner">
  <div class="resume-banner-inner">
    <div class="resume-icon">💾</div>
    <div class="resume-text">
      <strong>You have a saved session!</strong>
      <span id="resumeInfo">…</span>
    </div>
    <div class="resume-actions">
      <button class="resume-yes-btn" id="resumeYesBtn">▶ Resume</button>
      <button class="resume-no-btn"  id="resumeNoBtn">✕ Discard</button>
    </div>
  </div>
</div>

<!-- ── Quiz screen ── -->
<div class="main" id="quizScreen">
  <div class="q-card" id="qCard">
    <div class="q-num" id="qNum">Question 1</div>
    <div class="q-instruction">Arrange the syllables / aksharas below in the correct order.<br>
      <small style="color:var(--muted)">Click a tile or drag it into the answer row.</small>
    </div>

    <!-- Answer area -->
    <div class="drop-label">Your Answer ↓</div>
    <div class="drop-zone" id="dropZone">
      <span class="drop-zone-empty" id="dropEmpty">Place tiles here…</span>
    </div>

    <!-- Tile pool -->
    <div class="drop-label">Tiles ↓</div>
    <div class="pool-zone" id="poolZone"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Controls -->
    <div class="controls" id="controlsRow">
      <button class="btn btn-secondary" id="clearBtn">↺ Reset</button>
      <button class="btn btn-yellow"    id="revealBtn">💡 Reveal</button>
    </div>

    <!-- Navigation -->
    <div class="nav-row">
      <button class="btn btn-secondary" id="prevBtn">← Prev</button>
      <span class="spacer"></span>
      <button class="btn btn-secondary" id="nextBtn">Next →</button>
      <button class="btn btn-red"       id="finishBtn">✓ Finish</button>
    </div>
  </div>
</div>

<!-- ── Result screen ── -->
<div id="resultScreen">
  <div class="result-card">
    <div class="result-summary" id="resultSummary">
      <!-- filled by JS -->
    </div>
    <div class="result-body">
      <table class="result-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Your Answer</th>
            <th>Actual Word</th>
            <th>Status</th>
            <th>Page Ref</th>
          </tr>
        </thead>
        <tbody id="resultTbody"></tbody>
      </table>
    </div>
    <div style="padding:18px 24px;border-top:2px solid var(--surface2);">
      <button class="btn btn-primary" id="restartBtn">🔄 Play Again</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script src="questions5.js"></script>
<script>
// ════════════════════════════════════════════════════════════
//  Jumble Engine
// ════════════════════════════════════════════════════════════

const SAVE_KEY = 'jumble_save';

// Skip sno:0 (example) — use only sno 1–20
const questions = JUMBLE_LETTERS.filter(q => q.sno !== 0);
const EXAMPLE   = JUMBLE_LETTERS.find(q => q.sno === 0);
const TOTAL     = questions.length;

// State
let current  = 0;            // index into questions[]
let answers  = Array(TOTAL).fill(null);  // null | string (joined answer)
let revealed = Array(TOTAL).fill(false); // whether revealed
let score    = { correct: 0, wrong: 0 };

// Current question's tile state
let poolTiles   = [];   // tiles still in pool
let answerTiles = [];   // tiles placed in answer zone

// ── DOM refs ──
const quizScreen  = document.getElementById('quizScreen');
const resultScreen= document.getElementById('resultScreen');
const qNum        = document.getElementById('qNum');
const dropZone    = document.getElementById('dropZone');
const dropEmpty   = document.getElementById('dropEmpty');
const poolZone    = document.getElementById('poolZone');
const feedback    = document.getElementById('feedback');
const clearBtn    = document.getElementById('clearBtn');
const revealBtn   = document.getElementById('revealBtn');
const prevBtn     = document.getElementById('prevBtn');
const nextBtn     = document.getElementById('nextBtn');
const finishBtn   = document.getElementById('finishBtn');
const restartBtn  = document.getElementById('restartBtn');
const scCorrect   = document.getElementById('scCorrect');
const scWrong     = document.getElementById('scWrong');
const scSkipped   = document.getElementById('scSkipped');
const progressFill= document.getElementById('progressFill');
const progressLbl = document.getElementById('progressLabel');
const resumeBanner   = document.getElementById('resumeBanner');
const resumeInfo     = document.getElementById('resumeInfo');
const resumeYesBtn   = document.getElementById('resumeYesBtn');
const resumeNoBtn    = document.getElementById('resumeNoBtn');

// ════════════════════════════════════════════════════════════
//  Render
// ════════════════════════════════════════════════════════════

function renderQuestion(idx) {
  const q = questions[idx];
  const isLast = idx === TOTAL - 1;

  // heading
  const isExample = false;
  qNum.innerHTML = `Question ${idx + 1} <small style="color:var(--muted);font-size:.75rem;">/ ${TOTAL}</small>
    &nbsp;<span style="color:var(--accent2);font-size:.82rem;">Q.No. ${q.sno}</span>`;

  // reset feedback
  feedback.className = 'feedback';
  feedback.textContent = '';

  // build tile state from shuffled letters
  // Always re-shuffle pool (persisted order is fine, we just need to show tiles)
  poolTiles   = shuffle([...q.letters]);
  answerTiles = [];

  // If already answered, restore state
  if (answers[idx] !== null) {
    // Show answer tiles in drop zone (split by space or character-level?)
    // We stored the joined string; restore by splitting on answer's letter sequence
    // Actually store as array in answers[] instead — see selectAnswer()
  }
  if (answersArr[idx] !== null) {
    answerTiles = [...answersArr[idx]];
    // remove answerTiles from poolTiles
    const poolCopy = [...poolTiles];
    answerTiles.forEach(t => {
      const i = poolCopy.indexOf(t);
      if (i !== -1) poolCopy.splice(i, 1);
    });
    poolTiles = poolCopy;
  }

  renderTiles();
  updateFeedbackFromState(idx);

  prevBtn.disabled = idx === 0;
  nextBtn.disabled = false;
  nextBtn.textContent = 'Next →';

  // lock tiles only if revealed; otherwise keep interactive
  if (revealed[idx]) lockTiles(true, null, true);
  else               lockTiles(false);

  updateProgress();
  updateScorePills();
  saveSession();
}

function renderTiles() {
  // Drop zone
  dropZone.innerHTML = '';
  if (answerTiles.length === 0) {
    dropEmpty.style.display = '';
    dropZone.appendChild(dropEmpty);
  } else {
    dropEmpty.style.display = 'none';
    answerTiles.forEach((tile, i) => {
      dropZone.appendChild(makeTile(tile, 'answer', i));
    });
  }

  // Pool zone
  poolZone.innerHTML = '';
  poolTiles.forEach((tile, i) => {
    poolZone.appendChild(makeTile(tile, 'pool', i));
  });
}

function makeTile(text, zone, idx) {
  const el = document.createElement('span');
  el.className = 'tile' + (zone === 'answer' ? ' in-answer' : '');
  el.textContent = text;
  el.dataset.zone = zone;
  el.dataset.idx  = idx;

  // click: move between zones
  el.addEventListener('click', () => onTileClick(zone, idx));

  // drag
  el.draggable = true;
  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', JSON.stringify({ zone, idx }));
    el.classList.add('dragging');
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));

  return el;
}

function onTileClick(zone, idx) {
  if (revealed[current]) return;
  if (zone === 'pool') {
    // move pool → answer
    const tile = poolTiles.splice(idx, 1)[0];
    answerTiles.push(tile);
  } else {
    // move answer → pool
    const tile = answerTiles.splice(idx, 1)[0];
    poolTiles.push(tile);
  }
  // persist current tile state
  answersArr[current] = answerTiles.length > 0 ? [...answerTiles] : null;
  answers[current]    = answerTiles.length > 0 ? answerTiles.join('') : null;
  // clear feedback on interaction
  feedback.className = 'feedback';
  dropZone.classList.remove('correct-zone', 'wrong-zone');
  renderTiles();
  saveSession();
}

// ── Drag-and-drop onto zones ──
[dropZone, poolZone].forEach(zone => {
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const data = JSON.parse(e.dataTransfer.getData('text/plain') || 'null');
    if (!data) return;
    const { zone: fromZone, idx: fromIdx } = data;
    const targetZone = zone === dropZone ? 'answer' : 'pool';
    if (fromZone === targetZone) return; // same zone, no-op

    if (fromZone === 'pool') {
      const tile = poolTiles.splice(fromIdx, 1)[0];
      answerTiles.push(tile);
    } else {
      const tile = answerTiles.splice(fromIdx, 1)[0];
      poolTiles.push(tile);
    }
    // persist current tile state
    answersArr[current] = answerTiles.length > 0 ? [...answerTiles] : null;
    answers[current]    = answerTiles.length > 0 ? answerTiles.join('') : null;
    feedback.className = 'feedback';
    dropZone.classList.remove('correct-zone', 'wrong-zone');
    renderTiles();
    saveSession();
  });
});

// ════════════════════════════════════════════════════════════
//  Check / Reveal
// ════════════════════════════════════════════════════════════

clearBtn.addEventListener('click', () => resetTiles(current));
revealBtn.addEventListener('click', () => revealAnswer(current));

function revealAnswer(idx) {
  const q = questions[idx];
  if (!q.answer || q.answer.length === 0) { showToast('Answer not available'); return; }

  revealed[idx] = true;

  // place tiles in correct order
  const correctLetters = q.answer.length > 0 ? [...q.answer] : q.letters;
  answerTiles = correctLetters;
  poolTiles   = [];
  answersArr[idx] = [...answerTiles];
  answers[idx]    = answerTiles.join('');

  const actualWordHtml = q.actualWord ? ' <span style="color:var(--accent2);font-size:.82rem;font-style:italic;">(' + q.actualWord + ')</span>' : '';
  feedback.className = 'feedback correct';
  feedback.innerHTML = '💡 Answer: <span style="color:var(--green);font-weight:700;">' + q.answer.join(' ') + '</span>' + actualWordHtml;
  dropZone.classList.add('correct-zone');
  dropZone.classList.remove('wrong-zone');

  renderTiles();
  lockTiles(true, null, true); // revealed style

  recalcScore();
  updateScorePills();
  saveSession();
}

// Split answer back into original tile sequence (best-effort)
function splitToOriginalTiles(q, answer) {
  // Greedily match original tiles against the answer string
  const target = answer.replace(/\s+/g, '');
  const available = [...q.letters];
  const result = [];
  let pos = 0;
  while (pos < target.length && available.length > 0) {
    let matched = false;
    for (let i = 0; i < available.length; i++) {
      const t = available[i];
      if (target.startsWith(t, pos)) {
        result.push(t);
        available.splice(i, 1);
        pos += t.length;
        matched = true;
        break;
      }
    }
    if (!matched) { pos++; } // skip unmatched char
  }
  // Add any remaining tiles
  available.forEach(t => result.push(t));
  return result;
}

function resetTiles(idx) {
  const q = questions[idx];
  revealed[idx]   = false;
  poolTiles       = [...q.letters];  // original order, no shuffle
  answerTiles     = [];
  answersArr[idx] = null;
  answers[idx]    = null;
  feedback.className = 'feedback';
  feedback.innerHTML = '';
  dropZone.classList.remove('correct-zone', 'wrong-zone');
  revealBtn.disabled = false;
  clearBtn.disabled  = false;
  renderTiles();
  recalcScore();
  updateScorePills();
  saveSession();
}

function lockTiles(lock, isCorrect, isRevealed) {
  // Style all tiles in dropZone
  const tiles = dropZone.querySelectorAll('.tile');
  tiles.forEach(t => {
    t.classList.remove('correct-tile', 'wrong-tile');
    if (lock) {
      if (isRevealed) { t.style.color = 'var(--accent2)'; t.style.fontStyle = 'italic'; }
      else if (isCorrect === true)  t.classList.add('correct-tile');
      else if (isCorrect === false) t.classList.add('wrong-tile');
    }
  });
  // Disable reveal while answer is locked; Reset is always enabled
  const locked = lock && (isCorrect !== undefined || isRevealed);
  revealBtn.disabled = locked;
  clearBtn.disabled  = false;
}

function updateFeedbackFromState(idx) {
  if (!revealed[idx]) return;   // only restore UI for revealed questions
  const q = questions[idx];
  const answerDisplay = q.answer && q.answer.length > 0 ? q.answer.join(' ') : '';
  const actualWordHtml = q.actualWord ? ' <span style="color:var(--accent2);font-size:.82rem;font-style:italic;">(' + q.actualWord + ')</span>' : '';
  feedback.className = 'feedback correct';
  feedback.innerHTML = '💡 Answer: <span style="color:var(--green);font-weight:700;">' + answerDisplay + '</span>' + actualWordHtml;
  dropZone.classList.add('correct-zone');
  revealBtn.disabled = true;
  clearBtn.disabled  = false;
}

// ════════════════════════════════════════════════════════════
//  Navigation
// ════════════════════════════════════════════════════════════

prevBtn.addEventListener('click', () => {
  if (current > 0) { current--; renderQuestion(current); }
});
nextBtn.addEventListener('click', () => {
  if (current < TOTAL - 1) { current++; renderQuestion(current); }
});
finishBtn.addEventListener('click', showResult);

// ════════════════════════════════════════════════════════════
//  Score
// ════════════════════════════════════════════════════════════

function recalcScore() {
  let c = 0, w = 0;
  questions.forEach((q, i) => {
    if (answersArr[i] === null) return;
    if (!q.answer || q.answer.length === 0) return;
    const isOk = answersArr[i] &&
                 answersArr[i].length === q.answer.length &&
                 answersArr[i].every((t, j) => t === q.answer[j]);
    if (isOk) c++;
    else if (!revealed[i]) w++;
  });
  score.correct = c;
  score.wrong   = w;
}

function updateScorePills() {
  const skipped = answers.filter(a => a === null).length;
  scCorrect.textContent = score.correct;
  scWrong.textContent   = score.wrong;
  scSkipped.textContent = skipped;
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = TOTAL > 0 ? (answered / TOTAL) * 100 : 0;
  progressFill.style.width = pct + '%';
  progressLbl.textContent  = answered + ' / ' + TOTAL;
}

// ════════════════════════════════════════════════════════════
//  Result screen
// ════════════════════════════════════════════════════════════

function showResult() {
  quizScreen.style.display = 'none';
  resultScreen.style.display = 'block';

  recalcScore();
  const skipped  = answers.filter(a => a === null).length;
  const total    = TOTAL;
  const pct      = total > 0 ? Math.round((score.correct / total) * 100) : 0;

  document.getElementById('resultSummary').innerHTML = `
    <div class="result-stat"><div class="result-num" style="color:var(--green)">${score.correct}</div><div class="result-lbl">Correct</div></div>
    <div class="result-stat"><div class="result-num" style="color:var(--red)">${score.wrong}</div><div class="result-lbl">Wrong</div></div>
    <div class="result-stat"><div class="result-num" style="color:var(--yellow)">${skipped}</div><div class="result-lbl">Skipped</div></div>
    <div class="result-stat"><div class="result-num">${total}</div><div class="result-lbl">Total</div></div>
    <div class="result-stat"><div class="result-num" style="color:var(--accent2)">${pct}%</div><div class="result-lbl">Score</div></div>
  `;

  const tbody = document.getElementById('resultTbody');
  tbody.innerHTML = '';
  questions.forEach((q, i) => {
    const tr = document.createElement('tr');
    let statusHtml, answerHtml;

    const isOk = q.answer && q.answer.length > 0 && answersArr[i] &&
                 answersArr[i].length === q.answer.length &&
                 answersArr[i].every((t, j) => t === q.answer[j]);
    if (answersArr[i] === null) {
      statusHtml = '<span class="badge-skipped">○ Skipped</span>';
      answerHtml = '<span style="color:var(--muted)">—</span>';
    } else if (revealed[i]) {
      statusHtml = '<span style="color:var(--accent2);font-weight:700;">💡 Revealed</span>';
      answerHtml = '<span class="ans-text">' + (answersArr[i] || []).join(' ') + '</span>';
    } else if (isOk) {
      statusHtml = '<span class="badge-correct">✓ Correct</span>';
      answerHtml = '<span class="ans-text">' + (answersArr[i] || []).join(' ') + '</span>';
    } else {
      statusHtml = '<span class="badge-wrong">✗ Wrong</span>';
      answerHtml = answersArr[i] && answersArr[i].length > 0
        ? '<span class="ans-text">' + answersArr[i].join(' ') + '</span>'
        : '<span style="color:var(--muted)">—</span>';
    }
    const actualWordHtml = q.actualWord
      ? '<span style="color:var(--accent2);font-weight:600;">' + q.actualWord + '</span>'
        + (q.answer && q.answer.length > 0 ? '<br><span style="color:var(--muted);font-size:.75rem;">' + q.answer.join(' ') + '</span>' : '')
      : (q.answer && q.answer.length > 0
          ? '<span style="color:var(--muted);font-size:.78rem;">' + q.answer.join(' ') + '</span>'
          : '<span style="color:var(--muted)">—</span>');
    const refHtml = q.reference
      ? '<span style="color:var(--accent2);font-size:.78rem;">' + q.reference + '</span>'
      : '<span style="color:var(--muted)">—</span>';

    tr.innerHTML = `
      <td><span class="sno-badge">${q.sno}</span></td>
      <td>${answerHtml}</td>
      <td>${actualWordHtml}</td>
      <td>${statusHtml}</td>
      <td>${refHtml}</td>
    `;
    tbody.appendChild(tr);
  });
}

restartBtn.addEventListener('click', init);

// ════════════════════════════════════════════════════════════
//  Save / Load (localStorage)
// ════════════════════════════════════════════════════════════

function saveSession() {
  const data = {
    current,
    answers,
    answersArr,
    revealed,
    score,
    savedAt: Date.now()
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function clearSession() { localStorage.removeItem(SAVE_KEY); }

// ════════════════════════════════════════════════════════════
//  Utilities
// ════════════════════════════════════════════════════════════

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// answers as arrays (for display)
let answersArr = Array(TOTAL).fill(null);

// ════════════════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════════════════

function init() {
  clearSession();
  current    = 0;
  answers    = Array(TOTAL).fill(null);
  answersArr = Array(TOTAL).fill(null);
  revealed   = Array(TOTAL).fill(false);
  score      = { correct: 0, wrong: 0 };

  resumeBanner.style.display = 'none';
  quizScreen.style.display = '';
  resultScreen.style.display = 'none';

  renderQuestion(0);
}

function showResumeBanner(session) {
  const d    = new Date(session.savedAt);
  const when = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
             + ' ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  const answered = (session.answers || []).filter(a => a !== null).length;
  resumeInfo.textContent = `Saved on ${when} · Q${(session.current || 0) + 1} of ${TOTAL} · ${answered} answered`;
  resumeBanner.style.display = 'block';
  quizScreen.style.display   = 'none';
  resultScreen.style.display = 'none';
}

function restoreSession(session) {
  resumeBanner.style.display = 'none';
  current    = session.current    || 0;
  answers    = session.answers    || Array(TOTAL).fill(null);
  answersArr = session.answersArr || Array(TOTAL).fill(null);
  revealed   = session.revealed   || Array(TOTAL).fill(false);
  score      = session.score      || { correct: 0, wrong: 0 };
  quizScreen.style.display   = '';
  resultScreen.style.display = 'none';
  renderQuestion(current);
}

resumeYesBtn.addEventListener('click', () => restoreSession(loadSession()));
resumeNoBtn.addEventListener('click',  () => init());

// Check for saved session
(function boot() {
  const saved = loadSession();
  if (saved && saved.answers && saved.answers.length === TOTAL) {
    showResumeBanner(saved);
  } else {
    init();
  }
})();
</script>
