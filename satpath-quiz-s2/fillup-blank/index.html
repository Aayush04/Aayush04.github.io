<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fill in the Blanks — रिक्त स्थान भरिए</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #273549;
      --accent:   #14b8a6;
      --accent2:  #2dd4bf;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --radius:   14px;
      --shadow:   0 4px 24px rgba(0,0,0,.5);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 2px solid var(--surface2);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }
    .topbar h1 {
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      width: 140px;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Score pills ── */
    .score-pills { display: flex; gap: 10px; align-items: center; }
    .score-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: .82rem;
      font-weight: 700;
    }
    .correct-pill { background: rgba(34,197,94,.15);  color: var(--green); }
    .wrong-pill   { background: rgba(239,68,68,.15);  color: var(--red); }
    .skip-pill    { background: rgba(245,158,11,.15); color: var(--yellow); }

    /* ── Main ── */
    .main {
      max-width: 700px;
      margin: 36px auto 0;
      padding: 0 16px;
    }

    /* ── Question card ── */
    .q-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      margin-bottom: 24px;
      contain: layout style;
    }
    .q-num {
      font-size: .75rem;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }
    .q-instruction {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ── Sentence with inline inputs ── */
    .sentence {
      font-size: 1.05rem;
      line-height: 2.2;
      color: var(--text);
      word-break: break-word;
    }
    .blank-input {
      display: inline-block;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(45,212,191,.5);
      border-radius: 0;
      padding: 3px 0;
      margin: 0 10px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      min-width: 120px;
      width: auto;
      outline: none;
      transition: border-color .2s;
      vertical-align: middle;
      text-align: center;
    }
    .blank-input:focus {
      border-bottom-color: var(--accent2);
    }
    .blank-input.answered {
      border-bottom-color: rgba(45,212,191,.8);
    }
    /* locked states */
    .blank-input:disabled {
      cursor: default;
      opacity: 1;
    }
    .blank-input.correct-input {
      border-bottom-color: var(--green);
      color: var(--green);
      font-weight: 700;
    }
    .blank-input.wrong-input {
      border-bottom-color: var(--red);
      color: var(--red);
      font-weight: 700;
    }
    .blank-input.revealed-input {
      border-bottom-color: var(--accent2);
      color: var(--accent2);
      font-weight: 700;
    }

    /* ── Feedback bar ── */
    .feedback {
      min-height: 36px;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .88rem;
      font-weight: 600;
      margin-top: 18px;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .feedback.wrong   { background: rgba(239,68,68,.12);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
    .feedback.partial { background: rgba(245,158,11,.12); color: var(--yellow);border: 1px solid rgba(245,158,11,.3); }
    .feedback.info    { background: rgba(45,212,191,.10); color: var(--accent2);border: 1px solid rgba(45,212,191,.3); }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .12s;
    }
    .btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: scale(.96); }
    .btn:disabled { opacity: .38; cursor: not-allowed; }
    .btn-primary  { background: var(--accent);  color: #0f172a; }
    .btn-danger   { background: var(--red);     color: #fff; }
    .btn-warning  { background: var(--yellow);  color: #0f172a; }
    .btn-ghost    { background: var(--surface2); color: var(--text); }

    /* ── Nav row ── */
    .nav-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .nav-row .left  { display: flex; gap: 10px; }
    .nav-row .right { display: flex; gap: 10px; }

    /* ── Result screen ── */
    #resultScreen { display: none; }
    .result-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
      margin-bottom: 24px;
      text-align: center;
    }
    .result-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent2), #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .result-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin: 24px 0;
    }
    .result-stat { text-align: center; }
    .result-num  { font-size: 2rem; font-weight: 800; }
    .result-lbl  { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Review table ── */
    .review-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      overflow-x: auto;
    }
    .review-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-weight: 700;
      border-bottom: 1px solid var(--surface2);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.05); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .sno-badge {
      display: inline-block;
      background: var(--surface2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
    }
    .badge-correct { color: var(--green); font-weight: 700; }
    .badge-wrong   { color: var(--red);   font-weight: 700; }
    .badge-skipped { color: var(--yellow);font-weight: 700; }
    .badge-revealed { color: var(--accent2); font-weight: 700; }
    .ans-text { font-style: italic; color: var(--muted); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      border: 1px solid var(--surface2);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .topbar { padding: 10px 14px; }
      .q-card  { padding: 20px 16px; }
      .sentence { font-size: .95rem; }
      .blank-input { min-width: 90px; font-size: .88rem; }
    }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="topbar-left">
    <a href="../index.html" class="back-link">← वापस</a>
    <h1>✏️ रिक्त स्थान भरिए</h1>
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <div class="score-pills">
      <div class="score-pill correct-pill">✓ <span id="scCorrect">0</span></div>
      <div class="score-pill wrong-pill">✗ <span id="scWrong">0</span></div>
      <div class="score-pill skip-pill">○ <span id="scSkipped">0</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>
  </div>
</div>

<!-- ── Quiz screen ── -->
<div class="main" id="quizScreen">

  <!-- Question card -->
  <div class="q-card">
    <div class="q-num" id="qNum">Question 1</div>
    <div class="q-instruction" id="qInstruction">
      रिक्त स्थानों की पूर्ति कीजिए।
    </div>

    <!-- Sentence rendered here -->
    <div class="sentence" id="sentenceEl"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Controls -->
    <div class="controls" id="controlsRow">
      <button class="btn btn-primary" id="checkBtn">✓ जाँचें</button>
      <button class="btn btn-ghost"   id="clearBtn">↺ साफ़ करें</button>
      <button class="btn btn-warning" id="revealBtn">💡 उत्तर देखें</button>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav-row">
    <div class="left">
      <button class="btn btn-ghost" id="prevBtn" disabled>← पिछला</button>
      <button class="btn btn-ghost" id="nextBtn">अगला →</button>
    </div>
    <div class="right">
      <button class="btn btn-primary" id="finishBtn">📊 परिणाम देखें</button>
    </div>
  </div>

</div>

<!-- ── Result screen ── -->
<div class="main" id="resultScreen">
  <div class="result-card">
    <div class="result-title">📊 परिणाम</div>
    <div class="result-summary" id="resultSummary"></div>
    <button class="btn btn-primary" id="restartBtn">↺ फिर से शुरू करें</button>
  </div>
  <div class="review-card">
    <div class="review-title">विस्तृत समीक्षा</div>
    <table>
      <thead>
        <tr>
          <th>क्र.</th>
          <th>प्रश्न</th>
          <th>आपका उत्तर</th>
          <th>स्थिति</th>
        </tr>
      </thead>
      <tbody id="resultTbody"></tbody>
    </table>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script src="questions3.js"></script>
<script src="engine.js"></script>
</body>
</html>
